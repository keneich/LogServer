input {
  # Linux Filebeat — syslog / secure / audit
  redis {
    host     => "${REDIS_HOST}"
    port     => 6379
    password => "${REDIS_PASSWORD}"
    data_type => "list"
    key      => "filebeat"
    codec    => "json"
    tags     => ["linux"]
  }

  # Windows Winlogbeat — System / Security Event Log
  redis {
    host     => "${REDIS_HOST}"
    port     => 6379
    password => "${REDIS_PASSWORD}"
    data_type => "list"
    key      => "winlogbeat"
    codec    => "json"
    tags     => ["windows"]
  }
}

filter {
  # ── Linux 로그 처리 ────────────────────────────────────────
  if "linux" in [tags] {

    # syslog 파싱
    if [log][file][path] =~ "/(messages|syslog)$" {
      grok {
        match => {
          "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_host} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}"
        }
        tag_on_failure => ["_grok_syslog_failure"]
      }
      mutate { add_field => { "log_category" => "syslog" } }
    }

    # 인증 로그 파싱 (/var/log/secure)
    else if [log][file][path] =~ "/secure$" {
      grok {
        match => {
          "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_host} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}"
        }
        tag_on_failure => ["_grok_secure_failure"]
      }
      # SSH 로그인 성공/실패 구분
      if [syslog_message] =~ "Failed password" {
        mutate { add_field => { "auth_result" => "failed" } }
      } else if [syslog_message] =~ "Accepted" {
        mutate { add_field => { "auth_result" => "success" } }
      }
      mutate { add_field => { "log_category" => "auth" } }
    }

    # 감사 로그 파싱 (/var/log/audit/audit.log)
    else if [log][file][path] =~ "/audit/audit.log$" {
      grok {
        match => {
          "message" => "type=%{WORD:audit_type} msg=audit\(%{NUMBER:audit_epoch}:%{NUMBER:audit_seq}\): %{GREEDYDATA:audit_message}"
        }
        tag_on_failure => ["_grok_audit_failure"]
      }
      mutate { add_field => { "log_category" => "audit" } }
    }

    date {
      match => ["syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss"]
      target => "@timestamp"
      timezone => "Asia/Seoul"
    }
  }

  # ── Windows 로그 처리 ─────────────────────────────────────
  if "windows" in [tags] {
    if [winlog][channel] == "System" {
      mutate { add_field => { "log_category" => "windows_system" } }
    } else if [winlog][channel] == "Security" {
      mutate { add_field => { "log_category" => "windows_security" } }
    }
  }

  # ── 공통 필드 정리 ────────────────────────────────────────
  mutate {
    remove_field => ["agent", "ecs", "input", "log.offset"]
  }
}

output {
  elasticsearch {
    hosts                => ["${ES_HOSTS}"]
    user                 => "${ES_USER}"
    password             => "${ES_PASSWORD}"
    ssl                  => true
    ssl_certificate_verification => true
    cacert               => "/usr/share/logstash/certs/ca.crt"

    # ILM 설정
    ilm_enabled          => true
    ilm_rollover_alias   => "logs-%{[log_category]}"
    ilm_pattern          => "000001"
    ilm_policy           => "logs-ilm-policy"

    index                => "logs-%{[log_category]}-%{+YYYY.MM.dd}"
  }
}
