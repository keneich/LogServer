services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION}
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - cluster.name=${ES_CLUSTER_NAME}
      - node.name=${ES_NODE_NAME}
      - node.roles=data,data_hot,data_warm,data_cold,data_content,ingest
      - network.host=0.0.0.0
      - network.publish_host=${ES_NODE2_IP}
      - discovery.seed_hosts=${ES_NODE1_IP},${ES_NODE3_IP}
      - cluster.initial_master_nodes=node1
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=/usr/share/elasticsearch/config/certs/node2.key
      - xpack.security.http.ssl.certificate=/usr/share/elasticsearch/config/certs/node2.crt
      - xpack.security.http.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=/usr/share/elasticsearch/config/certs/node2.key
      - xpack.security.transport.ssl.certificate=/usr/share/elasticsearch/config/certs/node2.crt
      - xpack.security.transport.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca.crt
      - ES_JAVA_OPTS=-Xms${ES_HEAP_MIN} -Xmx${ES_HEAP_MAX}
      - bootstrap.memory_lock=true
      - path.data=/data/ssd,/data/hdd
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - ../../packages/shared/certs:/usr/share/elasticsearch/config/certs:ro
      - ./elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - ${ES_DATA_PATH_SSD}:/data/ssd
      - ${ES_DATA_PATH_HDD}:/data/hdd
    networks:
      - esnet
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --insecure -u \"elastic:${ELASTIC_PASSWORD}\" https://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  esnet:
    driver: bridge
